name: Daily Munich housing digest

# Runs once per day in the cloud (no need for your machine to be on).
#
# NOTE on time: GitHub Actions cron is in UTC. 10:00 UTC = 12:00 Europe/Berlin
# during summer time (CEST, ~late Mar–late Oct). In winter (CET) it would be 11:00
# local; change the cron to "0 11 * * *" if you still run it past October.
on:
  schedule:
    - cron: "0 10 * * *"    # 10:00 UTC = 12:00 (noon) Europe/Berlin during summer
  workflow_dispatch: {}      # allow manual "Run workflow" from the Actions tab

# Needed so the job can commit the updated dedup state (data/seen.json) back.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    concurrency:
      group: housing-digest    # never overlap runs
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run housing agent
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m housing_agent

      # Persist dedup state reliably by committing data/seen.json back to the repo,
      # so the next run only emails genuinely NEW listings. (Committed state is
      # deterministic, unlike the previous best-effort cache.) [skip ci] stops this
      # commit from triggering another workflow run.
      - name: Persist dedup state
        if: always()
        run: |
          git config user.name "housing-agent[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json || true
          if git diff --staged --quiet; then
            echo "No dedup changes to commit."
          else
            git commit -m "Update dedup state [skip ci]"
            git push
          fi

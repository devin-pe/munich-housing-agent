name: Daily Munich housing digest

# Runs once per day in the cloud (no need for your machine to be on).
#
# NOTE on time: GitHub Actions cron is in UTC. 07:07 UTC ≈ 09:07 Europe/Berlin
# during summer (CEST, ~late Mar–late Oct); 08:07 local in winter (CET) — change to
# "7 8 * * *" if you run it past October.
# We deliberately avoid the top of the hour (:00): GitHub heavily delays and
# sometimes DROPS scheduled runs at round times under load. An off-peak minute like
# :07 is more reliable. Scheduled runs are still best-effort (often minutes-to-hours
# late, occasionally dropped); use "Run workflow" for an immediate digest.
on:
  schedule:
    - cron: "7 7 * * *"      # 07:07 UTC ≈ 09:07 Europe/Berlin during summer
  workflow_dispatch: {}      # allow manual "Run workflow" from the Actions tab

# Needed so the job can push the dedup state to the `agent-state` branch.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # don't let a slow ranked run hang the job forever
    concurrency:
      group: housing-digest    # never overlap runs
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            ranker/requirements.txt

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ranker dependencies (optional, for ranked mode)
        # Heavy (~1.5 GB: torch/CLIP/MiniLM/CatBoost), pip-cached between runs.
        # NON-FATAL: if it fails, the agent still runs and the digest falls back to
        # by_site, so you always get an email. Remove this step to keep CI on by_site.
        continue-on-error: true
        run: pip install -r ranker/requirements.txt

      # Cache the downloaded encoder weights (CLIP ViT-B/32 ~350 MB, MiniLM ~90 MB)
      # so ranked runs don't re-download them every day.
      - name: Cache ML model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/clip
          key: ml-encoder-weights-v1

      # Restore the dedup store from the dedicated state branch (if it exists yet),
      # so we only email genuinely NEW listings. State lives on `agent-state`, NOT
      # on main — main stays clean and your own pushes never conflict.
      - name: Restore dedup state
        run: |
          mkdir -p data
          if git fetch origin agent-state 2>/dev/null; then
            git cat-file -p origin/agent-state:seen.json > data/seen.json 2>/dev/null || echo '{}' > data/seen.json
          else
            echo '{}' > data/seen.json
          fi

      - name: Run housing agent
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m housing_agent

      # Save the updated dedup store back to `agent-state` using git plumbing: build
      # a single-commit (parent-less) branch containing only seen.json and force-push
      # it. No history bloat, no commits on main, deterministic across runs.
      - name: Save dedup state
        if: always()
        env:
          GIT_AUTHOR_NAME: "housing-agent[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "housing-agent[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          test -f data/seen.json || exit 0
          blob=$(git hash-object -w data/seen.json)
          tree=$(printf '100644 blob %s\tseen.json\n' "$blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "Update dedup state $(date -u +%FT%TZ)")
          git push -f origin "$commit:refs/heads/agent-state"
